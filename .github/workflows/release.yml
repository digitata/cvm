name: Release Skill

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create skill zip
        run: |
          cd skills
          zip -r cvm2-flow-automation.zip cvm2-flow-automation/

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: skills/cvm2-flow-automation.zip
          body: |
            Latest skill bundle from main branch.

            Download and install in Claude Code.
