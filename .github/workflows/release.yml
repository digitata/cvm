name: Release Skill

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create skill zip
        run: |
          cd skills
          zip -r cvm2-flow-automation.zip cvm2-flow-automation/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: skills/cvm2-flow-automation.zip
          generate_release_notes: true
